<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Deals Store</title>
<style>
body {font-family: Arial; margin:0; background:#eaeded;}
header {background:#131921; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;}
.logo {font-size:22px; font-weight:bold;}
.search {width:50%; padding:8px; border-radius:5px; border:none;}

.banner {background:#febd69; padding:10px; text-align:center; font-weight:bold;}

.container {display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:20px;}

.card {background:white; padding:15px; border-radius:10px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.1); transition:0.3s;}
.card:hover {transform:scale(1.05);}

.card img {width:100%; height:150px; object-fit:contain;}

.rating {color:orange; margin:5px 0;}
.price {color:#b12704; font-size:18px; font-weight:bold;}

button {background:#ffd814; border:none; padding:10px; width:100%; cursor:pointer; font-weight:bold; border-radius:5px;}
button:hover {background:#f7ca00;}

.footer {background:#131921; color:white; text-align:center; padding:15px; margin-top:20px;}
</style>
</head>
<body>

<header>
  <div class="logo">🛒 MyDeals</div>
  <input type="text" class="search" placeholder="Search products...">
</header>

<div class="banner">🔥 Limited Time Deals | Free Delivery Available</div>

<div class="container" id="productContainer"></div>

<div class="footer">© 2026 MyDeals Store | Affiliate Website</div>

<script>
const products = [
  {name:"Wireless Headphones", price:"₹799", img:"https://m.media-amazon.com/images/I/61CGHv6kmWL._SX679_.jpg", link:"YOUR_LINK"},
  {name:"Smart Watch", price:"₹1499", img:"https://m.media-amazon.com/images/I/71Zf9uUp+GL._SX679_.jpg", link:"YOUR_LINK"},
  {name:"Bluetooth Speaker", price:"₹999", img:"https://m.media-amazon.com/images/I/61u48FEsbCL._SX679_.jpg", link:"YOUR_LINK"}
];

while(products.length < 50){
  products.push(...products.slice(0, 50 - products.length));
}

const container = document.getElementById("productContainer");

products.forEach(p => {
  container.innerHTML += `
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <div class="rating">⭐⭐⭐⭐☆</div>
      <div class="price">${p.price}</div>
      <a href="${p.link}"><button>Add to Cart</button></a>
    </div>
  `;
});
</script>

</body>
</html>
